<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>News Fetcher</title>
</head>
<body>
    <script>
        /**
         * Cleans text and truncates it to a maximum of 3 sentences.
         * Handles English full stops (.) and Chinese full stops (。).
         */
        const cleanAndTruncateText = (text) => {
            if (!text) return "";
            
            // 1. Decode HTML entities
            const doc = new DOMParser().parseFromString(text, 'text/html');
            let decodedText = doc.documentElement.textContent;

            // 2. Initial cleaning of control characters and backslashes
            let cleaned = decodedText
                .replace(/[\r\n\t]+/g, " ")
                .replace(/["“”„]/g, "'")
                .replace(/\\/g, "")
                .replace(/\s\s+/g, ' ')
                .trim();

            // 3. Truncate to first 3 sentences
            // Split by English full stop followed by space OR Chinese full stop
            // We use a lookbehind/lookahead style logic or a simple split/slice
            const sentences = cleaned.split(/([.。])\s*/);
            
            let result = "";
            let sentenceCount = 0;
            
            for (let i = 0; i < sentences.length; i++) {
                if (sentenceCount >= 3) break;
                
                const part = sentences[i];
                if (part === "." || part === "。") {
                    result += part;
                    sentenceCount++;
                } else if (part.trim().length > 0) {
                    result += (result.length > 0 && !result.endsWith("。") ? " " : "") + part;
                    // If this is the last part and doesn't have a trailing punctuation, count it as a sentence
                    if (i === sentences.length - 1) sentenceCount++;
                }
            }

            return result.trim();
        };

        /**
         * AI Edge Gallery Interface
         * Fetches multiple RSS feeds, converts XML to JSON, and consolidates the output.
         * The input `data` should be a JSON string containing an array of URLs:
         * { "feeds": ["url1", "url2", ...] }
         */
        window["ai_edge_gallery_get_result"] = async (dataStr, secret) => {
            try {
                // Parse the input data
                const data = JSON.parse(dataStr);
                const urls = data.feeds;

                if (!urls || !Array.isArray(urls)) {
                    throw new Error("Invalid input format. Expected a JSON string with a 'urls' array.");
                }

                // Fetch all feeds in parallel
                const feedPromises = urls.map(async (url) => {
                    try {
                        const proxyUrl = `https://th8qyh4r2g.execute-api.ap-east-1.amazonaws.com/default/cors-proxy?url=${encodeURIComponent(url)}`;
                        const response = await fetch(proxyUrl, {
                            headers: {
                                'Authorization': `${secret}`
                            }
                        });
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status} for url: ${url}`);
                        }
                        const xmlText = await response.text();
                        //console.warn(`Fetched data from ${url}:`, xmlText.substring(0, 200) + "..."); // Log the first 200 chars for debugging
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                        const items = xmlDoc.querySelectorAll("item");

                        // Extract items and convert to JSON structure
                        return Array.from(items).slice(0, 3).map(item => {
                            const rawTitle = item.querySelector("title")?.textContent || "";
                            const rawDescription = item.querySelector("description")?.textContent || "";

                            return {
                                title: cleanText(rawTitle),
                                //link: item.querySelector("link")?.textContent || "",
                                pubDate: item.querySelector("pubDate")?.textContent || "",
                                description: cleanText(rawDescription),
                                sourceUrl: url // Track which feed this came from
                            };
                        });
                    } catch (e) {
                         console.error(`Error fetching or parsing ${url}: ${e.message}`, e);
                         // Return an empty array for this feed if it fails, so we still process the others
                         return [];
                    }
                });

                const allResults = await Promise.all(feedPromises);
                
                // Consolidate the arrays of articles into a single flat array
                const consolidatedArticles = allResults.flat();

                const result = {
                    status: "success",
                    total_articles_fetched: consolidatedArticles.length,
                    articles: consolidatedArticles
                };

                console.warn("Final consolidated articles:", result.articles);

                return JSON.stringify(result, null, 2);

            } catch (error) {
                return JSON.stringify({ 
                    error: "Failed to process feeds", 
                    details: error.message 
                });
            }
        };
    </script>
</body>
</html>
